spring.application.name=notification-service

server.port=8085

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=Pass@123

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Common-lib event packages
spring.kafka.consumer.properties.spring.json.type.mapping=\
orderCreatedEvent:net.sarvesh.commonlib.event.OrderCreatedEvent,\
paymentSuccessEvent:net.sarvesh.commonlib.event.PaymentSuccessEvent,\
paymentFailedEvent:net.sarvesh.commonlib.event.PaymentFailedEvent

# Optional logging
logging.level.org.springframework.kafka=INFO
logging.level.net.sarvesh.notificationservice=DEBUG